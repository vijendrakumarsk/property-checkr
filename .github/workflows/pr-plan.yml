name: Terraform Plan (PR Preview)

# Runs on every PR targeting main — posts plan as a comment
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  id-token: write       # OIDC auth with AWS
  contents: read
  pull-requests: write  # Post plan as PR comment

env:
  TF_VERSION: "1.7.5"
  NODE_VERSION: "20"

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── AWS Auth ──────────────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Terraform Plan ────────────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        # Capture output and exit code separately so a non-zero plan doesn't
        # fail the step before we can post the comment
        run: |
          terraform plan -no-color \
            -var-file="${{ secrets.TF_VARS_FILE }}" \
            2>&1 | tee plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      # ── Post plan as PR comment ───────────────────────────────────────────────
      - name: Post plan to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const maxLen = 65000;
            const truncated = plan.length > maxLen
              ? plan.slice(0, maxLen) + '\n\n... [truncated — see Actions log for full output]'
              : plan;

            const body = [
              '## Terraform Plan',
              '',
              `**PR:** #${{ github.event.pull_request.number }}`,
              `**Triggered by:** @${{ github.actor }}`,
              `**Vars file:** \`${{ secrets.TF_VARS_FILE }}\``,
              '',
              '<details><summary>Show Plan</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '',
              '</details>',
              '',
              '${{ steps.plan.outputs.exit_code }}' === '0'
                ? '✅ Plan succeeded — safe to merge.'
                : '❌ Plan failed — review errors above before merging.',
            ].join('\n');

            // Find and update existing plan comment if present
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Terraform Plan')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if plan errored
        if: steps.plan.outputs.exit_code != '0'
        run: exit 1
